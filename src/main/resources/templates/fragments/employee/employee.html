<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(pageTitle, content, sessionUser)">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Employee</title>
    <link rel="stylesheet" th:href="@{/css/shared/layout.css}">
</head>

<body>
    <div class="role-shell">
        <aside class="role-sidebar role-sidebar-employee">
            <div class="role-sidebar-header">
                <h2>Employee</h2>
                <p th:text="${sessionUser != null ? sessionUser.fullName : 'Nhân viên'}">Nhân viên</p>
            </div>
            <nav class="role-nav">
                <a th:href="@{/employee/dashboard}">Dashboard</a>
                <a href="#">Shift</a>
                <a href="#">Check in - checkout</a>
                <a href="#">Lịch sử chấm công</a>
                <a href="#">Request</a>
                <a href="#">Trạng thái chấm công</a>
            </nav>
        </aside>

        <main class="role-main">
            <header class="role-header">
                <h1 th:text="${pageTitle}">Employee Dashboard</h1>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="logout-btn">Logout</button>
                </form>
            </header>
            <section class="role-content" th:replace="${content}"></section>
        </main>
    </div>
</body>

</html>
