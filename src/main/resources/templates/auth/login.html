<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập hệ thống</title>
    <link rel="stylesheet" th:href="@{/css/auth/login.css}">
</head>

<body>
    <main class="auth-shell">
        <section class="auth-card">
            <p class="auth-brand">QuanLyCaLam</p>
            <h1>Đăng nhập</h1>
            <p class="auth-subtitle">Dùng email và mật khẩu để truy cập đúng giao diện theo vai trò.</p>

            <div class="alert alert-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

            <form th:action="@{/login}" th:object="${loginRequest}" method="post" class="auth-form">
                <label for="email">Email</label>
                <input id="email" type="email" th:field="*{email}" placeholder="name@company.com" required>
                <small class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></small>

                <label for="password">Mật khẩu</label>
                <input id="password" type="password" th:field="*{password}" placeholder="Nhập mật khẩu" required>
                <small class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></small>

                <button type="submit">Đăng nhập</button>
            </form>
        </section>
    </main>
</body>

</html>
