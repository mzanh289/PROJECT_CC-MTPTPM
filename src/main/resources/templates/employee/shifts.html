<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{fragments/employee/employee :: layout(${pageTitle}, ~{::content}, ${sessionUser})}">

<th:block th:fragment="content">
    <section>
        <h2>Danh sách ca làm của tôi</h2>
        <p>Xem các ca làm đã được phân cho tài khoản của bạn.</p>

        <table class="data-table" th:if="${!#lists.isEmpty(shifts)}">
            <thead>
                <tr>
                    <th>Ngày làm</th>
                    <th>Tên ca</th>
                    <th>Bắt đầu</th>
                    <th>Kết thúc</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${shifts}">
                    <td th:text="${item.workDate}">2026-04-09</td>
                    <td th:text="${item.shiftName}">Ca sáng</td>
                    <td th:text="${item.startTime}">08:00</td>
                    <td th:text="${item.endTime}">17:00</td>
                </tr>
            </tbody>
        </table>

        <div class="helper-text" th:if="${#lists.isEmpty(shifts)}">
            Hiện tại bạn chưa có ca làm nào được phân công.
        </div>
    </section>
</th:block>

</html>
