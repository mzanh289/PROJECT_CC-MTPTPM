<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${formTitle}">Thêm/Sửa ca làm</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="jsp-body">

    <div class="schedule-shell">

        <!-- HEADER -->
        <header class="hero-panel">
            <div class="hero-copy">
                <h1 class="page-title" th:text="${formTitle}">Ca làm</h1>
                <p style="margin-top: 6px; color: #777; font-size: 13px;">
                    Điền thông tin ca làm bên dưới
                </p>
            </div>
        </header>

        <!-- FORM WRAPPER -->
        <section style="
        display:flex;
        justify-content:center;
        padding: 30px 16px;
    ">

            <div style="
            width: 100%;
            max-width: 460px;
            background: #fff;
            border-radius: 14px;
            padding: 22px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
        ">

                <form th:action="${formAction}" method="post" style="display:flex; flex-direction:column; gap:16px;">

                    <!-- TÊN CA -->
                    <div style="display:flex; flex-direction:column; gap:6px;">
                        <label style="font-size:13px; color:#666;">Tên ca</label>
                        <input type="text" name="shiftName" th:value="${shift.shiftName}" required style="
                                padding:11px 12px;
                                border:1px solid #e5e5e5;
                                border-radius:10px;
                                outline:none;
                                transition:0.2s;
                           ">
                    </div>

                    <!-- TIME -->
                    <div style="display:flex; gap:10px;">

                        <div style="flex:1; display:flex; flex-direction:column; gap:6px;">
                            <label style="font-size:13px; color:#666;">Bắt đầu</label>
                            <input type="time" name="startTime" th:value="${shift.startTime}" required style="
                                    padding:11px 12px;
                                    border:1px solid #e5e5e5;
                                    border-radius:10px;
                               ">
                        </div>

                        <div style="flex:1; display:flex; flex-direction:column; gap:6px;">
                            <label style="font-size:13px; color:#666;">Kết thúc</label>
                            <input type="time" name="endTime" th:value="${shift.endTime}" required style="
                                    padding:11px 12px;
                                    border:1px solid #e5e5e5;
                                    border-radius:10px;
                               ">
                        </div>

                    </div>

                    <!-- BUTTONS -->
                    <div style="
                    display:flex;
                    justify-content:flex-end;
                    gap:10px;
                    margin-top:10px;
                ">

                        <a th:href="@{/admin/shifts}" style="
                            padding:10px 14px;
                            border-radius:10px;
                            text-decoration:none;
                            background:#f2f2f2;
                            color:#444;
                            font-size:14px;
                       ">
                            Hủy
                        </a>

                        <button type="submit" style="
                                padding:10px 14px;
                                border-radius:10px;
                                border:none;
                                background:#2563eb;
                                color:white;
                                font-size:14px;
                                cursor:pointer;
                            ">
                            Lưu
                        </button>

                    </div>

                </form>

            </div>

        </section>

    </div>

</body>

</html>
