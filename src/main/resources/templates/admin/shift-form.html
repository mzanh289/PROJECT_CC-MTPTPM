<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${formTitle}">Thêm/Sửa ca làm</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="jsp-body">
    <div class="schedule-shell">
        <header class="hero-panel">
            <div class="hero-copy">
                <div class="eyebrow">
                    <img th:src="@{/images/icons/icon10.svg}" alt="">
                    <span th:text="${formTitle}">Thêm/Sửa ca làm</span>
                </div>
                <h1 class="page-title" th:text="${formTitle}">Thêm/Sửa ca làm</h1>
            </div>
        </header>
        <section class="surface-card">
            <form th:action="${formAction}" method="post" class="form-grid">
                <div class="field-block">
                    <label class="field-label" for="shiftName">Tên ca</label>
                    <input type="text" id="shiftName" name="shiftName" th:value="${shift.shiftName}" required>
                </div>
                <div class="field-block">
                    <label class="field-label" for="startTime">Giờ bắt đầu</label>
                    <input type="time" id="startTime" name="startTime" th:value="${shift.startTime}" required>
                </div>
                <div class="field-block">
                    <label class="field-label" for="endTime">Giờ kết thúc</label>
                    <input type="time" id="endTime" name="endTime" th:value="${shift.endTime}" required>
                </div>
                <div class="field-block" style="grid-column: 1 / -1; display: flex; gap: 12px;">
                    <button class="button" type="submit"><img class="icon-inline" th:src="@{/images/icons/icon16.svg}"
                            alt="">Lưu</button>
                    <a class="button-ghost" th:href="@{/admin/shifts}">Hủy</a>
                </div>
            </form>
        </section>
    </div>
</body>

</html>
