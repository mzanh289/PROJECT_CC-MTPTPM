<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${formTitle}">Tạo ca làm</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .form-panel {
            max-width: 600px;
            margin: 30px auto;
            padding: 30px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
            font-size: 14px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
            box-sizing: border-box;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #1976d2;
            box-shadow: 0 0 0 3px rgba(25, 118, 210, 0.1);
        }

        .form-error {
            color: #d32f2f;
            font-size: 12px;
            margin-top: 5px;
            display: block;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            transition: all 0.3s;
        }

        .btn-primary {
            background-color: #1976d2;
            color: white;
            flex: 1;
        }

        .btn-primary:hover {
            background-color: #1565c0;
        }

        .btn-secondary {
            background-color: #757575;
            color: white;
            flex: 1;
        }

        .btn-secondary:hover {
            background-color: #616161;
        }

        .alert {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
        }

        .alert-success {
            background-color: #c8e6c9;
            color: #2e7d32;
            border: 1px solid #81c784;
        }

        .alert-error {
            background-color: #ffcdd2;
            color: #c62828;
            border: 1px solid #ef5350;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 28px;
            color: #333;
        }

        .form-subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }
    </style>
</head>

<body class="jsp-body">
    <div class="schedule-shell">
        <!-- Header -->
        <header class="hero-panel">
            <div class="hero-copy">
                <div class="eyebrow">
                    <img th:src="@{/images/icons/icon3.svg}" alt="">
                    Quản lý ca làm
                </div>
                <h1 class="page-title" th:text="${formTitle}">Tạo ca mới</h1>
            </div>
        </header>

        <!-- Form content -->
        <section class="form-panel">
            <form th:action="${formAction}" method="post" th:object="${shift}">
                <!-- Tên ca làm -->
                <div class="form-group">
                    <label for="shiftName">Tên ca làm <span style="color: red;">*</span></label>
                    <input type="text" 
                           id="shiftName" 
                           th:field="*{shiftName}" 
                           placeholder="Ví dụ: Ca sáng, Ca chiều, Ca tối"
                           required>
                    <span th:if="${#fields.hasErrors('shiftName')}" 
                          th:errors="*{shiftName}" 
                          class="form-error"></span>
                </div>

                <!-- Giờ bắt đầu -->
                <div class="form-group">
                    <label for="startTime">Giờ bắt đầu <span style="color: red;">*</span></label>
                    <input type="time" 
                           id="startTime" 
                           th:field="*{startTime}" 
                           required>
                    <span th:if="${#fields.hasErrors('startTime')}" 
                          th:errors="*{startTime}" 
                          class="form-error"></span>
                </div>

                <!-- Giờ kết thúc -->
                <div class="form-group">
                    <label for="endTime">Giờ kết thúc <span style="color: red;">*</span></label>
                    <input type="time" 
                           id="endTime" 
                           th:field="*{endTime}" 
                           required>
                    <span th:if="${#fields.hasErrors('endTime')}" 
                          th:errors="*{endTime}" 
                          class="form-error"></span>
                </div>

                <!-- Form actions -->
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Lưu ca làm</button>
                    <a th:href="@{/admin/shifts}" class="btn btn-secondary">Quay lại</a>
                </div>
            </form>
        </section>
    </div>
</body>

</html>
