<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{fragments/Admin/admin :: layout(${pageTitle}, ~{::content}, ${sessionUser}, '/css/admin/users.css')}">

<th:block th:fragment="content">
    <section class="users-panel">
        <h2 th:text="${isEdit} ? 'Cập nhật User' : 'Tạo User mới'">Tạo User mới</h2>

        <div class="user-alert user-alert-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <form class="user-form" th:action="${submitUrl}" method="post" th:object="${userForm}">
            <div class="field-group">
                <label for="fullName">Họ tên</label>
                <input id="fullName" type="text" th:field="*{fullName}" required>
                <small class="field-error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></small>
            </div>

            <div class="field-group">
                <label for="email">Email</label>
                <input id="email" type="email" th:field="*{email}" required>
                <small class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></small>
            </div>

            <div class="field-group">
                <label for="phone">Số điện thoại</label>
                <input id="phone" type="text" th:field="*{phone}">
                <small class="field-error" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></small>
            </div>

            <div class="field-group">
                <label for="status">Trạng thái</label>
                <select id="status" th:field="*{status}" required>
                    <option th:value="true">Active</option>
                    <option th:value="false">Inactive</option>
                </select>
                <small class="field-error" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></small>
            </div>

            <div class="field-group">
                <label for="password" th:text="${isEdit} ? 'Mật khẩu mới (để trống nếu giữ nguyên)' : 'Mật khẩu'"></label>
                <input id="password" type="password" th:field="*{password}" th:required="${!isEdit}">
            </div>

            <div class="form-actions">
                <button type="submit" class="user-btn user-btn-primary">Lưu</button>
                <a th:href="@{/admin/users}" class="user-btn user-btn-ghost">Quay lại</a>
            </div>
        </form>
    </section>
</th:block>

</html>
