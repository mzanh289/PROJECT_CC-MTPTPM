<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{fragments/Admin/admin :: layout('Phân ca cho nhân viên', ~{::content}, ${sessionUser}, '/css/admin/assign.css')}">


<th:block th:fragment="content">
    <div class="schedule-shell" style="max-width: 800px; margin: 0 auto; width: 100%;">
        <header class="hero-panel">
            <div class="hero-copy">
                <div class="eyebrow">
                    <img th:src="@{/images/icons/icon11.svg}" alt="">
                    Phân ca cho nhân viên
                </div>
                <h1 class="page-title">Phân ca cho nhân viên</h1>
                <p class="page-subtitle">Chọn nhân viên, ca làm và ngày để phân công.</p>
            </div>
        </header>
        <section class="surface-card">

            <!-- Flash Messages -->
            <div th:if="${success != null}" class="alert alert-success">
                <img th:src="@{/images/icons/icon4.svg}" class="icon-inline" alt="">
                <span th:text="${success}">Thành công!</span>
            </div>
            <div th:if="${error != null}" class="alert alert-error">
                <img th:src="@{/images/icons/icon15.svg}" class="icon-inline" alt="">
                <span th:text="${error}">Có lỗi xảy ra!</span>
            </div>

            <form th:action="${formAction}" method="post" class="form-grid">
                <div class="field-block">
                    <label class="field-label" for="userId">Nhân viên</label>
                    <select id="userId" name="userId" required>
                        <option value="">-- Chọn nhân viên --</option>
                        <option th:each="user : ${users}" th:value="${user.userId}" th:text="${user.fullName}"></option>
                    </select>
                </div>
                <div class="field-block">

                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <label class="field-label" for="shiftId">Ca làm</label>
                    </div>
                    <select id="shiftId" name="shiftId" required>
                        <option value="">-- Chọn ca --</option>
                        <option th:each="shift : ${shifts}" th:value="${shift.shiftId}"
                            th:text="${shift.shiftName} + ' (' + ${shift.startTime} + ' - ' + ${shift.endTime} + ')'">
                        </option>
                    </select>
                </div>

                <!-- Quick Create Shift Section -->
                <div id="quickCreateSection" class="quick-create" style="display: none;">
                    <div class="quick-create-title">
                        <img th:src="@{/images/icons/icon10.svg}" class="icon-inline" alt="">Tạo ca làm mới
                    </div>
                    <div class="quick-create-fields">
                        <div class="field-block">
                            <label class="field-label" for="newShiftName">Tên ca</label>
                            <input type="text" id="newShiftName" placeholder="VD: Ca đêm">
                        </div>
                        <div class="field-block">
                            <label class="field-label" for="newStartTime">Giờ bắt đầu</label>
                            <input type="time" id="newStartTime">
                        </div>
                        <div class="field-block">
                            <label class="field-label" for="newEndTime">Giờ kết thúc</label>
                            <input type="time" id="newEndTime">
                        </div>
                        <button type="button" class="button-small" onclick="createShiftQuick()">
                            <img th:src="@{/images/icons/icon16.svg}" class="icon-inline" alt="">Thêm
                        </button>
                    </div>
                </div>
                <div class="field-block">
                    <label class="field-label" for="workDate">Ngày làm</label>
                    <input type="date" id="workDate" name="workDate" th:value="${workDate}" required>
                </div>

                <div class="field-block" style="flex-direction: row; gap: 12px; justify-content: flex-end;">
                    <button class="button" type="submit"><img class="icon-inline" th:src="@{/images/icons/icon16.svg}"
                            alt="">Lưu</button>
                    <a class="button-ghost" th:href="@{/admin/schedule/daily}">Hủy</a>
                </div>
            </form>
        </section>

        <script>
            function toggleQuickCreate() {
                var section = document.getElementById('quickCreateSection');
                section.style.display = section.style.display === 'none' ? 'block' : 'none';
            }

            function createShiftQuick() {
                var shiftName = document.getElementById('newShiftName').value;
                var startTime = document.getElementById('newStartTime').value;
                var endTime = document.getElementById('newEndTime').value;

                if (!shiftName || !startTime || !endTime) {
                    alert('Vui lòng điền đầy đủ thông tin ca làm!');
                    return;
                }

                var form = document.createElement('form');
                form.method = 'POST';
                form.action = '/admin/shifts/save';

                var fields = [
                    { name: 'shiftName', value: shiftName },
                    { name: 'startTime', value: startTime },
                    { name: 'endTime', value: endTime }
                ];

                fields.forEach(function (field) {
                    var input = document.createElement('input');
                    input.type = 'hidden';
                    input.name = field.name;
                    input.value = field.value;
                    form.appendChild(input);
                });

                document.body.appendChild(form);
                form.submit();
            }
        </script>
    </div>
</th:block>
