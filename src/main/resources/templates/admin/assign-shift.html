<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phân ca cho nhân viên</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body.jsp-body {
            background: #f7f8fa;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        .schedule-shell {
            max-width: 480px;
            margin: 40px auto;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.07);
            padding: 0 0 32px 0;
        }

        .hero-panel {
            background: #fff;
            border-bottom: 1px solid #e5e7eb;
            border-radius: 10px 10px 0 0;
            padding: 32px 32px 16px 32px;
            text-align: center;
        }

        .hero-copy .eyebrow {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #3b82f6;
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 8px;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 700;
            margin: 0 0 8px 0;
            color: #22223b;
        }

        .page-subtitle {
            color: #6b7280;
            font-size: 1rem;
            margin-bottom: 0;
        }

        .surface-card {
            padding: 32px;
        }

        .form-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .field-block {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field-label {
            font-weight: 500;
            color: #374151;
            margin-bottom: 2px;
        }

        select,
        input[type="date"] {
            padding: 8px 12px;
            border: 1px solid #d1d5db;
            border-radius: 5px;
            background: #f9fafb;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        select:focus,
        input[type="date"]:focus {
            border-color: #3b82f6;
            outline: none;
        }

        .button {
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 5px;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.2s;
        }

        .button:hover {
            background: #2563eb;
        }

        .button-ghost {
            background: none;
            color: #3b82f6;
            border: 1px solid #3b82f6;
            border-radius: 5px;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .button-ghost:hover {
            background: #e0e7ff;
            color: #1e40af;
        }

        .icon-inline {
            width: 18px;
            height: 18px;
        }

        @media (max-width: 600px) {

            .schedule-shell,
            .hero-panel,
            .surface-card {
                padding: 16px !important;
            }
        }
    </style>
</head>

<body class="jsp-body">
    <div class="schedule-shell">
        <header class="hero-panel">
            <div class="hero-copy">
                <div class="eyebrow">
                    <img th:src="@{/images/icons/icon11.svg}" alt="">
                    Phân ca cho nhân viên
                </div>
                <h1 class="page-title">Phân ca cho nhân viên</h1>
                <p class="page-subtitle">Chọn nhân viên, ca làm và ngày để phân công.</p>
            </div>
        </header>
        <section class="surface-card">
            <form th:action="${formAction}" method="post" class="form-grid">
                <div class="field-block">
                    <label class="field-label" for="userId">Nhân viên</label>
                    <select id="userId" name="userId" required>
                        <option value="">-- Chọn nhân viên --</option>
                        <option th:each="user : ${users}" th:value="${user.userID}" th:text="${user.fullName}"></option>
                    </select>
                </div>
                <div class="field-block">
                    <label class="field-label" for="shiftId">Ca làm</label>
                    <select id="shiftId" name="shiftId" required>
                        <option value="">-- Chọn ca --</option>
                        <option th:each="shift : ${shifts}" th:value="${shift.shiftID}" th:text="${shift.shiftName}">
                        </option>
                    </select>
                </div>
                <div class="field-block">
                    <label class="field-label" for="workDate">Ngày làm</label>
                    <input type="date" id="workDate" name="workDate" th:value="${workDate}" required>
                </div>
                <div class="field-block" style="flex-direction: row; gap: 12px; justify-content: flex-end;">
                    <button class="button" type="submit"><img class="icon-inline" th:src="@{/images/icons/icon16.svg}"
                            alt="">Lưu</button>
                    <a class="button-ghost" th:href="@{/admin/assigned-shifts}">Hủy</a>
                </div>
            </form>
        </section>
    </div>
</body>

</html>
