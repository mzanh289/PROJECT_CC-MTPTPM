<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý ca làm</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="jsp-body">
    <div class="schedule-shell">
        <header class="hero-panel">
            <div class="hero-copy">
                <div class="eyebrow">
                    <img th:src="@{/images/icons/icon3.svg}" alt="">
                    Quản lý ca làm
                </div>
                <h1 class="page-title">Danh sách ca làm</h1>
                <p class="page-subtitle">Tạo, sửa, xóa các ca làm việc (sáng, chiều, tối).</p>
            </div>
            <div class="hero-actions">
                <a class="button" th:href="@{/admin/shifts/new}"><img class="icon-inline"
                        th:src="@{/images/icons/icon10.svg}" alt="">Tạo ca mới</a>
            </div>
        </header>
        <section class="surface-card">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Tên ca</th>
                        <th>Giờ bắt đầu</th>
                        <th>Giờ kết thúc</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="shift : ${shifts}">
                        <td th:text="${shift.shiftName}">Ca sáng</td>
                        <td th:text="${shift.startTime}">06:00</td>
                        <td th:text="${shift.endTime}">14:00</td>
                        <td>
                            <a class="button-quiet" th:href="@{'/admin/shifts/edit/' + ${shift.shiftID}}"><img
                                    class="icon-inline" th:src="@{/images/icons/icon14.svg}" alt="">Sửa</a>
                            <a class="button-quiet button-quiet--danger"
                                th:href="@{'/admin/shifts/delete/' + ${shift.shiftID}}"><img class="icon-inline"
                                    th:src="@{/images/icons/icon15.svg}" alt="">Xóa</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(shifts)}">
                        <td colspan="4" class="helper-text helper-text--center">Chưa có ca làm nào.</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </div>
</body>

</html>
