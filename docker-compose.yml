services:
  mysql:
    image: mysql:8.0
    container_name: qlcl_mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --default-time-zone=+07:00
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-shiftmanage}
      MYSQL_USER: ${MYSQL_USER:-shift_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-shift_pass}
      TZ: ${APP_TIMEZONE:-Asia/Ho_Chi_Minh}
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p${MYSQL_ROOT_PASSWORD:-root123} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qlcl_app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-shiftmanage}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=${APP_TIMEZONE:-Asia/Ho_Chi_Minh}&useUnicode=true&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-shift_user}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-shift_pass}
      SPRING_SQL_INIT_MODE: never
      TZ: ${APP_TIMEZONE:-Asia/Ho_Chi_Minh}
      JAVA_TOOL_OPTIONS: -Duser.timezone=${APP_TIMEZONE:-Asia/Ho_Chi_Minh}
    ports:
      - "${APP_PORT:-8081}:8081"

volumes:
  mysql_data:
